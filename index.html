<!DOCTYPE html>
<html>
<head>
    <title>COMBAT‑AID Commander Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin:0; padding:0; }
        #map { position:absolute; top:0; bottom:0; width:100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Center on Patna (latitude 25.5941, longitude 85.1376)
        var map = L.map('map').setView([25.5941, 85.1376], 13);

        // Use OpenStreetMap tiles (free, no key)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Store markers (circle markers) by soldier ID
        var markers = {};

        // Add or update a soldier marker
        // color can be: "green", "orange", "red", "gray"
        function addMarker(id, lat, lon, color, label) {
            if (markers[id]) {
                // Update existing marker
                markers[id].setLatLng([lat, lon]);
                markers[id].setStyle({ fillColor: color, color: color });
                // Update popup content
                markers[id].setPopupContent(label);
            } else {
                // Create a new circle marker
                var marker = L.circleMarker([lat, lon], {
                    radius: 10,
                    fillColor: color,
                    color: color,
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map);
                if (label) {
                    marker.bindPopup(label);
                }
                markers[id] = marker;
            }
        }

        // Remove a soldier marker
        function removeMarker(id) {
            if (markers[id]) {
                map.removeLayer(markers[id]);
                delete markers[id];
            }
        }
    </script>
</body>
</html>
